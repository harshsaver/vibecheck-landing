        .download-icon svg { width: 36px; height: 36px; color: #fff; }
        .download-status {

            font-weight: 700;
            font-size: 28px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        .download-detail {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .download-detail .os-name { color: var(--primary); font-weight: 700; }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {

        }
        .divider {
            width: 100%;

            background: rgba(255,255,255,0.1);

        .alt-heading {

            justify-content: center;
            flex-wrap: wrap;

        .alt-btn {

            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            text-decoration: none;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            transition: all 0.2s;
        }
        .alt-btn:hover { border-color: var(--primary); color: var(--primary); }
        .alt-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .alt-btn.active:hover { background: var(--accent); }
        .alt-btn svg { width: 18px; height: 18px; }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            font-family: 'Oswald', sans-serif;
            font-weight: 500;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--primary); }
        @media (max-width: 480px) {
            .alt-downloads { flex-direction: column; align-items: center; }
            .alt-btn { width: 100%; justify-content: center; }
        }
    </style>
</head>

<script>
const MAC_URL = 'https://github.com/harshsaver/vibecheck-landing/releases/download/v0.1.0/VibeCheck_0.1.0_aarch64.dmg';
const WIN_URL = 'https://github.com/harshsaver/vibecheck-landing/releases/download/v0.1.0/FlexTheGrind_0.1.0_x64-setup.exe';

function detectOS() {
    const ua = navigator.userAgent || navigator.platform || '';
    if (/Mac|iPhone|iPad|iPod/i.test(ua)) return 'mac';
    if (/Win/i.test(ua)) return 'windows';
    return 'unknown';
}

const os = detectOS();
const osNameEl = document.getElementById('os-name');
const statusEl = document.getElementById('status');
const detailEl = document.getElementById('detail');
const spinnerEl = document.getElementById('spinner');
const macBtn = document.getElementById('mac-btn');
const winBtn = document.getElementById('win-btn');

let downloadUrl = null;

if (os === 'mac') {
    osNameEl.textContent = 'macOS';
    downloadUrl = MAC_URL;
    macBtn.classList.add('active');
} else if (os === 'windows') {
    osNameEl.textContent = 'Windows';
    downloadUrl = WIN_URL;
    winBtn.classList.add('active');
} else {
    osNameEl.textContent = 'your OS';
    statusEl.textContent = 'Choose Your Platform';
    detailEl.innerHTML = 'We couldn\'t auto-detect your OS. Please pick your platform below.';
    spinnerEl.style.display = 'none';
}

if (downloadUrl) {
    setTimeout(() => {
        window.location.href = downloadUrl;
        spinnerEl.style.display = 'none';
        statusEl.textContent = 'Download Started!';
        detailEl.innerHTML = 'If the download didn\'t start, <a href="' + downloadUrl + '" style="color: var(--primary); text-decoration: underline;">click here</a>.';
    }, 1500);
}
</script>
