<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download FlexTheGrind</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #5CB832;
            --secondary: #2D2D2D;
            --accent: #4AA825;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            color: #fff;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        .download-page {
            text-align: center;
            padding: 48px 24px;
            max-width: 520px;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 56px;
            text-decoration: none;
            display: inline-block;
        }
        .logo span { color: var(--primary); }

        /* Checkmark icon */
        .check-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s;
        }
        .check-icon.visible {
            opacity: 1;
            transform: scale(1);
        }
        .check-icon svg { width: 28px; height: 28px; color: #fff; }

        /* Progress bar */
        .progress-wrap {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 32px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 1.4s ease-in-out;
        }
        .progress-bar.complete { width: 100%; }

        .download-title {
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 20px;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }
        .download-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.45);
            margin-bottom: 0;
            line-height: 1.5;
        }
        .download-sub a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .download-sub a:hover { text-decoration: underline; }

        /* Version & file info */
        .file-info {
            display: inline-flex;
            align-items: center;
            gap: 16px;
            margin-top: 24px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.35);
        }
        .file-info span { display: flex; align-items: center; gap: 5px; }
        .file-info svg { width: 13px; height: 13px; opacity: 0.5; }

        /* Alt platform */
        .alt-section {
            margin-top: 48px;
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .alt-label {
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            margin-bottom: 16px;
            letter-spacing: 0.03em;
        }
        .alt-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 13px;
            text-decoration: none;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            background: transparent;
            transition: all 0.2s;
        }
        .alt-btn:hover { border-color: rgba(255,255,255,0.25); color: #fff; }
        .alt-btn svg { width: 16px; height: 16px; }

        .back-link {
            display: inline-block;
            margin-top: 32px;
            font-size: 13px;
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: rgba(255,255,255,0.5); }

        /* GitHub source link */
        .source-note {
            margin-top: 48px;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
        }
        .source-note a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
        }
        .source-note a:hover { color: var(--primary); }

        @media (max-width: 480px) {
            .file-info { flex-direction: column; gap: 6px; }
        }
    </style>
</head>
<body>

<div class="download-page">
    <a href="index.html" class="logo">FlexThe<span>Grind</span></a>

    <div class="check-icon" id="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    </div>

    <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="download-title" id="title">Preparing your download...</div>
    <div class="download-sub" id="subtitle">
        Detected <strong id="os-name">your platform</strong>
    </div>

    <div class="file-info" id="file-info" style="display: none;">
        <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Signed &amp; verified
        </span>
        <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="8 12 12 16 16 8"/></svg>
            v0.1.0
        </span>
        <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            GitHub Releases
        </span>
    </div>

    <div class="alt-section" id="alt-section">
        <div class="alt-label" id="alt-label">Also available for</div>
        <a id="alt-btn" href="#" class="alt-btn">
            <span id="alt-btn-text">Other platform</span>
        </a>
    </div>

    <a href="index.html" class="back-link">&larr; Back to homepage</a>

    <div class="source-note">
        Open source on <a href="https://github.com/harshsaver/vibecheck-landing/releases" target="_blank" rel="noopener">GitHub</a>
    </div>
</div>

<script>
const MAC_URL = 'https://github.com/harshsaver/vibecheck-landing/releases/download/v0.1.0/VibeCheck_0.1.0_aarch64.dmg';
const WIN_URL = 'https://github.com/harshsaver/vibecheck-landing/releases/download/v0.1.0/FlexTheGrind_0.1.0_x64-setup.exe';

function detectOS() {
    const ua = navigator.userAgent || navigator.platform || '';
    if (/Mac|iPhone|iPad|iPod/i.test(ua)) return 'mac';
    if (/Win/i.test(ua)) return 'windows';
    return 'unknown';
}

const os = detectOS();
const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const osNameEl = document.getElementById('os-name');
const progressWrap = document.getElementById('progress-wrap');
const progressBar = document.getElementById('progress-bar');
const checkIcon = document.getElementById('check-icon');
const fileInfo = document.getElementById('file-info');
const altSection = document.getElementById('alt-section');
const altBtn = document.getElementById('alt-btn');
const altBtnText = document.getElementById('alt-btn-text');
const altLabel = document.getElementById('alt-label');

let downloadUrl = null;

if (os === 'mac') {
    osNameEl.textContent = 'macOS';
    downloadUrl = MAC_URL;
    altBtn.href = WIN_URL;
    altBtnText.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="width:16px;height:16px;margin-right:4px"><path d="M3 12V6.75l6-1.32v6.48L3 12zm6.98.07l.02 6.55 5.98 .83V12.1l-6 -.03zM10 5.17L15.98 4.2V12l-5.98-.05V5.17zM16 12.11l7.98.01V4.9L16 5.6v6.51zm0 .89l7.98.08v7.13L16 18.9v-5.9zM3 12.5l6 .07v6.25l-6 .83V12.5z"/></svg> Download for Windows instead';
} else if (os === 'windows') {
    osNameEl.textContent = 'Windows';
    downloadUrl = WIN_URL;
    altBtn.href = MAC_URL;
    altBtnText.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" style="width:16px;height:16px;margin-right:4px"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> Download for macOS instead';
} else {
    osNameEl.textContent = 'your platform';
    titleEl.textContent = 'Choose your platform';
    subtitleEl.textContent = 'Select your operating system below to download.';
    progressWrap.style.display = 'none';
    altLabel.textContent = 'Available platforms';
    altSection.innerHTML = `
        <div class="alt-label">Available platforms</div>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
            <a href="${MAC_URL}" class="alt-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                macOS
            </a>
            <a href="${WIN_URL}" class="alt-btn">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><path d="M3 12V6.75l6-1.32v6.48L3 12zm6.98.07l.02 6.55 5.98 .83V12.1l-6 -.03zM10 5.17L15.98 4.2V12l-5.98-.05V5.17zM16 12.11l7.98.01V4.9L16 5.6v6.51zm0 .89l7.98.08v7.13L16 18.9v-5.9zM3 12.5l6 .07v6.25l-6 .83V12.5z"/></svg>
                Windows
            </a>
        </div>
    `;
}

if (downloadUrl) {
    // Start progress bar animation
    requestAnimationFrame(() => {
        progressBar.classList.add('complete');
    });

    setTimeout(() => {
        window.location.href = downloadUrl;
        progressWrap.style.display = 'none';
        checkIcon.classList.add('visible');
        titleEl.textContent = 'Your download has started';
        subtitleEl.innerHTML = 'Didn\u2019t work? <a href="' + downloadUrl + '">Download manually</a>';
        fileInfo.style.display = 'inline-flex';
    }, 1500);
}
</script>

</body>
</html>
